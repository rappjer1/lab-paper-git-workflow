project:
  title: Example Research Manuscript
  slug: example_research_paper
  research_repo: ./research-project
  manuscript_repo: ./paper
  github_repo: https://github.com/example-owner/example-paper
  overleaf_url: ""
  main_tex: main.tex
  supplement_tex: supplement/supplement.tex
  has_supplement: true

validation:
  max_file_size_mb: 25
  forbidden_patterns:
    - "*.npz"
    - "*.pt"
    - "*.pth"
    - "*.pkl"
    - "*.nc"
    - "*.zip"
    - "data/external"
    - "full_eval"
    - "prediction_cache"
    - "raw_api_cache"

name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e ".[dev,build]"
      - name: Ruff
        run: ruff check .
      - name: Text blob line-ending guard
        run: python scripts/dev/check_text_blobs.py
      - name: Root layout check
        run: python scripts/dev/check_root_layout.py
      - name: Contract audit
        run: python scripts/dev/check_contracts.py
      - name: Docs and examples check
        run: python scripts/dev/check_docs_examples.py
      - name: Docs link check
        run: python scripts/dev/check_docs_links.py
      - name: Example integrity
        run: python scripts/dev/check_example_integrity.py
      - name: Public safety audit
        run: python scripts/dev/check_public_safety.py
      - name: Release candidate audit plan
        run: python scripts/dev/release_candidate_audit.py --plan
      - name: Dogfood scenarios
        run: python scripts/dev/run_dogfood.py --output scratch/dogfood
      - name: Run tests
        run: python scripts/dev/run_tests.py
      - name: CLI help
        run: paper-scaffold --help
      - name: CLI version
        run: paper-scaffold --version
      - name: Module help
        run: python -m paper_scaffold --help
      - name: Self-test
        run: paper-scaffold self-test
      - name: CLI demo
        run: paper-scaffold demo --output scratch/demo_manuscript --overwrite
      - name: Release-check demo
        run: paper-scaffold release-check --manuscript-repo scratch/demo_manuscript --write-report scratch/demo_manuscript/release_check.md
      - name: Artifact checks
        run: |
          paper-scaffold stale-artifacts --manuscript-repo scratch/demo_manuscript
          paper-scaffold unused-artifacts --manuscript-repo scratch/demo_manuscript
      - name: Build package
        run: python -m build
      - name: Upload validation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-report-${{ matrix.os }}-${{ matrix.python-version }}
          path: |
            scratch/demo_manuscript/release_check.md

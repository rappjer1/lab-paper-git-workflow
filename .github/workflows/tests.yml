name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests
      - name: CLI help
        run: paper-scaffold --help
      - name: CLI demo
        run: paper-scaffold demo --output scratch/demo_manuscript --overwrite
